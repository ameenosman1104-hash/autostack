<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Inventory Tracker Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#1E293B; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:12px; padding:2.5rem; width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
    .login-logo { color:#3B82F6; font-size:2rem; font-weight:800; }
    .login-sub  { color:#64748B; font-size:.85rem; }
    .btn-login  { background:#3B82F6; border:none; font-weight:600; padding:.65rem; }
    .btn-login:hover { background:#2563EB; }
    .form-control:focus { border-color:#3B82F6; box-shadow:0 0 0 .2rem rgba(59,130,246,.25); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo">▎ ITP</div>
      <div class="fw-bold fs-5 mt-1">Inventory Tracker Pro</div>
      <div class="login-sub">Sign in to your portal</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-danger py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login w-100 text-white">Sign In</button>
    </form>

    <div class="text-center mt-3" style="font-size:.88rem;">
      Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Create one</a>
    </div>
    <div class="text-center mt-2" style="color:#94A3B8;font-size:.75rem;">
      Inventory Tracker Pro &copy; 2026
    </div>
  </div>
</body>
</html>
