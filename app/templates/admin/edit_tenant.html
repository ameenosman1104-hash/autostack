{% extends "base.html" %}
{% block content %}
<div class="page-title">Edit Shop — {{ tenant.business_name }}</div>
<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Business Name</label>
        <input type="text" name="business_name" class="form-control" value="{{ tenant.business_name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" value="{{ tenant.email }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">New Password <span class="text-muted small">(leave blank to keep current)</span></label>
        <input type="password" name="password" class="form-control">
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="is_active" id="isActive" {{ 'checked' if tenant.is_active }}>
        <label class="form-check-label" for="isActive">Account Active</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
