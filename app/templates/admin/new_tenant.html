{% extends "base.html" %}
{% block content %}
<div class="page-title">Add New Shop</div>
<div class="card" style="max-width:500px;">
  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Business Name *</label>
        <input type="text" name="business_name" class="form-control" placeholder="e.g. Osbro Tyres" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Username *</label>
        <input type="text" name="username" class="form-control" placeholder="e.g. osbro_tyres" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password *</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Shop</button>
        <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
