{% extends "base.html" %}
{% block content %}
<div class="page-title">{{ 'Edit Debtor' if debtor else 'Add Debtor' }}</div>
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST" data-autosave="true">
      <div class="mb-3">
        <label class="form-label fw-semibold">Customer Name *</label>
        <input type="text" name="name" class="form-control" value="{{ debtor.name if debtor else '' }}" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ debtor.phone if debtor else '' }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" value="{{ debtor.email if debtor else '' }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Amount Owed (R) *</label>
          <input type="number" step="0.01" name="amount_owed" class="form-control" value="{{ debtor.amount_owed if debtor else '' }}" required>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Date of Purchase *</label>
          <input type="date" name="date_of_purchase" class="form-control" value="{{ debtor.date_of_purchase if debtor else today }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Products Owed</label>
        <input type="text" name="products_owed" class="form-control" value="{{ debtor.products_owed if debtor else '' }}" placeholder="e.g. 195/60R15, BMW 320d tyres">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Send reminder every</label>
        <div class="d-flex flex-wrap gap-2 mt-1">
          {% for label, days in freq_options %}
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="reminder_days" value="{{ days }}"
                   {{ 'checked' if (debtor and debtor.reminder_days|int == days) or (not debtor and days == 14) }}>
            <label class="form-check-label">{{ label }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notify via</label>
        <div class="d-flex gap-3 mt-1">
          {% for val, lbl in [('email','Email'),('sms','SMS'),('whatsapp','WhatsApp')] %}
          <div class="form-check">
            <input class="form-check-input" type="radio" name="notify_method" value="{{ val }}"
                   {{ 'checked' if (debtor and debtor.notify_method == val) or (not debtor and val == 'email') }}>
            <label class="form-check-label">{{ lbl }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notes / Reference</label>
        <input type="text" name="notes" class="form-control" value="{{ debtor.notes if debtor else '' }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('debtors.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
