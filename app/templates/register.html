<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — Inventory Tracker Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#1E293B; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { border:none; border-radius:12px; padding:2.5rem; width:100%; max-width:440px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
    .logo { color:#3B82F6; font-size:2rem; font-weight:800; }
    .btn-create { background:#3B82F6; border:none; font-weight:600; padding:.65rem; }
    .btn-create:hover { background:#2563EB; }
    .form-control:focus { border-color:#3B82F6; box-shadow:0 0 0 .2rem rgba(59,130,246,.25); }
  </style>
</head>
<body>
  <div class="card bg-white">
    <div class="text-center mb-4">
      <div class="logo">▎ ITP</div>
      <div class="fw-bold fs-5 mt-1">Inventory Tracker Pro</div>
      <div class="text-muted" style="font-size:.85rem;">Create your shop account</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat=='danger' else 'success' }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Business Name *</label>
        <input type="text" name="business_name" class="form-control" placeholder="e.g. Osbro Tyres" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Username *</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password *</label>
        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password *</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-create btn-primary w-100 text-white mb-3">Create Account</button>
      <div class="text-center" style="font-size:.88rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Sign in</a>
      </div>
    </form>
  </div>
</body>
</html>
