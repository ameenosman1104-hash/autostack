{% extends "base.html" %}
{% block content %}
<div class="page-title">{{ 'Edit Product' if product else 'Add Product' }}</div>
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST" data-autosave="true">
      {% if not product %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Product Code *</label>
        <input type="text" name="code" class="form-control" required>
      </div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Product Name *</label>
        <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Category</label>
          <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Unit</label>
          <input type="text" name="unit" class="form-control" value="{{ product.unit if product else 'PCS' }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Current Stock</label>
          <input type="number" step="0.01" name="current_stock" class="form-control" value="{{ product.current_stock if product else 0 }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Min Level (Reorder)</label>
          <input type="number" step="0.01" name="reorder_level" class="form-control" value="{{ product.reorder_level if product else 0 }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Last Cost Price (R)</label>
          <input type="number" step="0.01" name="last_cost_price" class="form-control" value="{{ product.last_cost_price if product else 0 }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Supplier</label>
          <input type="text" name="supplier" class="form-control" value="{{ product.supplier if product else '' }}">
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('inventory.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
