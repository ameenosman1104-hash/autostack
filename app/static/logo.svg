<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#1E293B" rx="10"/>

  <!-- 3D A shape - green -->
  <g transform="translate(50, 50)">
    <!-- Left side of A -->
    <polygon points="30,0 10,60 20,65 40,5" fill="#22C55E"/>
    <!-- Right side of A -->
    <polygon points="40,5 60,65 70,60 50,0" fill="#16A34A"/>
    <!-- Crossbar -->
    <rect x="20" y="35" width="40" height="8" fill="#22C55E"/>
    <!-- Black blocks behind A -->
    <rect x="0" y="40" width="15" height="30" fill="#1F2937"/>
    <rect x="55" y="40" width="15" height="30" fill="#1F2937"/>
  </g>

  <!-- Text "Autostack" -->
  <text x="100" y="160" font-size="32" font-weight="bold" text-anchor="middle" fill="#FFF">
    Auto<tspan fill="#22C55E">stack</tspan>
  </text>
</svg>
